<!DOCTYPE html>
<html lang="en">
  <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Debug - 3D Rendering Test</title>
      
      <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
<body style="margin: 0; background-color: #000;">
    <a-scene background="color: #222" renderer="colorManagement: true, physicallyCorrectLights">
            
            <!-- Lighting -->
            <a-entity light="type: ambient; color: #FFF; intensity: 0.8"></a-entity>a-entity>
            <a-entity light="type: directional; color: #FFF; intensity: 1" position="-0.5 1 1"></a-entity>a-entity>
            <a-camera position="0 0.5 2"></a-camera>a-camera>
    
            <!-- The "Jelly Baby" character directly in the scene -->
            <a-entity id="jelly-baby-container" position="0 0 0" scale="1 1 1">
                        
                        <a-entity id="baby-body">
                                        <!-- Capsule Shape (Cylinder + 2 Spheres) -->
                                        <a-cylinder radius="0.3" height="0.6" color="#ff69b4" material="roughness: 0.1; metalness: 0.1"></a-cylinder>a-cylinder>
                                        <a-sphere position="0 0.3 0" radius="0.3" color="#ff69b4" material="roughness: 0.1; metalness: 0.1"></a-sphere>a-sphere>
                                        <a-sphere position="0 -0.3 0" radius="0.3" color="#ff69b4" material="roughness: 0.1; metalness: 0.1"></a-sphere>a-sphere>
                        
                                        <!-- Big Disney Eyes -->
                                        <a-sphere position="-0.15 0.3 0.28" radius="0.1" color="white">
                                                            <a-sphere position="0 0 0.05" radius="0.04" color="black"></a-sphere>a-sphere>
                                                        </a-sphere>a-sphere>
                                        <a-sphere position="0.15 0.3 0.28" radius="0.1" color="white">
                                                            <a-sphere position="0 0 0.05" radius="0.04" color="black"></a-sphere>a-sphere>
                                                        </a-sphere>a-sphere>
                        
                                        <!-- Cute Smile -->
                                        <a-ring position="0 0.1 0.28" radius-inner="0.06" radius-outer="0.08" theta-start="180" theta-length="180" color="#8b0000"></a-ring>a-ring>
                                    </a-entity>a-entity>
            
                    </a-entity>a-entity>
    
            <!-- Instructions -->
            <a-entity position="0 -1 0" text="value: DEBUG PAGE: If you can see the PINK CHARACTER, the 3D part works.; align: center; width: 4;"></a-entity>a-entity>
        </a-scene>a-scene>
</body>body>
</html>html></title>
  </head>

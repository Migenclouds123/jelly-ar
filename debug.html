<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Debug - 3D Rendering Test</title>

      <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
      <script src="https://unpkg.com/aframe-rounded-box-component@1.1.0/dist/aframe-rounded-box-component.min.js"></script>
  </head>
  <body style="margin: 0; background-color: #000;">
      <a-scene background="color: #222" renderer="colorManagement: true, physicallyCorrectLights">

          <!-- Lighting -->
          <a-entity light="type: ambient; color: #FFF; intensity: 0.8"></a-entity>
          <a-entity light="type: directional; color: #FFF; intensity: 1" position="-0.5 1 1"></a-entity>

          <a-camera position="0 0.5 2"></a-camera>

          <!-- The "Jelly Baby" character directly in the scene -->
          <a-entity id="jelly-baby-container" position="0 0 0" scale="1 1 1">

              <a-rounded-box 
                  id="baby-body"
                  width="0.8" height="1" depth="0.8" 
                  radius="0.2" 
                  color="#ff69b4" 
                  material="roughness: 0.1; metalness: 0.1">

                  <!-- Big Disney Eyes -->
                  <a-sphere position="-0.25 0.3 0.41" radius="0.15" color="white">
                      <a-sphere position="0 0 0.1" radius="0.05" color="black"></a-sphere>
                  </a-sphere>
                  <a-sphere position="0.25 0.3 0.41" radius="0.15" color="white">
                      <a-sphere position="0 0 0.1" radius="0.05" color="black"></a-sphere>
                  </a-sphere>

                  <!-- Cute Smile -->
                  <a-ring position="0 0.1 0.41" radius-inner="0.08" radius-outer="0.1" theta-start="180" theta-length="180" color="#8b0000"></a-ring>
              </a-rounded-box>

          </a-entity>

          <!-- Instructions -->
          <a-entity position="0 -1 0" text="value: DEBUG PAGE: If you can see the PINK CHARACTER, the 3D part works.; align: center; width: 4;"></a-entity>
      </a-scene>
  </body>
  </html>

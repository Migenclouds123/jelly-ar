<html lang="en">
    <head>

        <div id="scanning-overlay" class="hidden">
                    <div class="inner">

    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true; uiScanning: #scanning-overlay" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false">
            <a-entity light="type: ambient; color: #FFF; intensity: 0.8"></a-entity>a-entity>
            <a-entity light="type: directional; color: #FFF; intensity: 1" position="-0.5 1 1"></a-entity>a-entity>
            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>a-camera>
            <a-entity mindar-image-target="targetIndex: 0">

                                                                                </a-sphere>a-sphere>
                                                            <a-sphere position="0.15 0.3 0.28" radius="0.1" color="white">

                                                                                </a-sphere>a-sphere>

                                                        </a-entity>a-entity>

                    </a-entity>a-entity>
        </a-scene>a-scene>
